<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollonian Gasket — Step 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #010204;
            overflow: hidden;
            height: 100vh;
        }

        canvas {
            display: block;
        }

        #info {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            color: #475569;
            font: 0.7rem/1 monospace;
            text-align: center;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <div id="info">–</div>
    <script>
        'use strict';

        // ── Complex arithmetic ──────────────────────────────────────────────────────
        const C = {
            add: (a, b) => ({ re: a.re + b.re, im: a.im + b.im }),
            sub: (a, b) => ({ re: a.re - b.re, im: a.im - b.im }),
            mul: (a, b) => ({ re: a.re * b.re - a.im * b.im, im: a.re * b.im + a.im * b.re }),
            scale: (a, s) => ({ re: a.re * s, im: a.im * s }),
            // Principal square root (positive real part)
            sqrt: (a) => {
                const mod = Math.sqrt(a.re * a.re + a.im * a.im);
                const r = Math.sqrt(mod);
                const θ = Math.atan2(a.im, a.re) / 2;
                return { re: r * Math.cos(θ), im: r * Math.sin(θ) };
            }
        };

        // ── Expected tangency distance between new circle (radius r4) and existing ci ──
        // External tangency: dist = r4 + ri
        // New circle is inside the outer enclosing circle (ki < 0): dist = |ri| - r4
        function tDist(r4, ki) {
            return ki < 0 ? (-1 / ki) - r4 : (1 / ki) + r4;
        }

        // ── Validate a Soddy candidate against three reference circles ──────────────
        function isValidSoddy(cand, c1, c2, c3) {
            if (!isFinite(cand.x) || !isFinite(cand.y) || !isFinite(cand.k)) return false;
            if (cand.k <= 0) return false;                  // only positive curvature (inner circles)
            const r4 = 1 / cand.k;

            // Must fit inside the outer bounding circle (radius 1, centered at origin)
            const distFromOrigin = Math.hypot(cand.x, cand.y);
            if (distFromOrigin + r4 > 1.0 + 1e-5) return false;

            // Must be tangent to all three reference circles within tolerance
            for (const ci of [c1, c2, c3]) {
                const expected = tDist(r4, ci.k);
                if (expected < -1e-6) return false;         // geometrically impossible
                const actual = Math.hypot(cand.x - ci.x, cand.y - ci.y);
                const tol = 1e-3 * expected + 1e-7;
                if (Math.abs(actual - expected) > tol) return false;
            }
            return true;
        }

        // ── Descartes' Circle Theorem with branch-safe validation ──────────────────
        // For 3 mutually tangent circles, computes the (up to 2) Soddy circles.
        //
        // Scalar Descartes:  k4 = k1+k2+k3 ± 2√(k1k2+k2k3+k3k1)
        // Complex Descartes: z4·k4 = (z1k1+z2k2+z3k3) ± 2√(k1k2·z1z2+k2k3·z2z3+k3k1·z3z1)
        //
        // The ± in the center formula is independent of the ± in the curvature formula.
        // We try all 4 combinations (2 k-values × 2 sqrt branches) and keep only valid ones.
        function soddyPair(c1, c2, c3) {
            const { k: k1, x: x1, y: y1 } = c1;
            const { k: k2, x: x2, y: y2 } = c2;
            const { k: k3, x: x3, y: y3 } = c3;

            const kS = k1 + k2 + k3;
            const det = k1 * k2 + k2 * k3 + k3 * k1;
            if (det < -1e-9) return [];                     // no real Soddy curvature exists

            const sq = Math.sqrt(Math.max(0, det));
            const k4a = kS + 2 * sq;
            const k4b = kS - 2 * sq;

            const z1 = { re: x1, im: y1 };
            const z2 = { re: x2, im: y2 };
            const z3 = { re: x3, im: y3 };

            // zS = z1k1 + z2k2 + z3k3
            const zS = C.add(C.add(C.scale(z1, k1), C.scale(z2, k2)), C.scale(z3, k3));

            // inner = k1k2·z1z2 + k2k3·z2z3 + k3k1·z3z1
            const inner = C.add(
                C.add(C.scale(C.mul(z1, z2), k1 * k2),
                    C.scale(C.mul(z2, z3), k2 * k3)),
                C.scale(C.mul(z3, z1), k3 * k1)
            );

            // Two branches of sqrt(inner): sqP and sqN = -sqP
            const sqP = C.sqrt(inner);
            const sqN = { re: -sqP.re, im: -sqP.im };

            // Try all 4 combinations, keep the valid Soddy circles
            const valid = [];
            const seen = new Set();

            for (const k4 of [k4a, k4b]) {
                if (Math.abs(k4) < 1e-10) continue;
                for (const branch of [sqP, sqN]) {
                    // z4 = (zS + 2·branch) / k4
                    const z4 = C.scale(C.add(zS, C.scale(branch, 2)), 1 / k4);
                    const cand = { k: k4, x: z4.re, y: z4.im };

                    if (!isValidSoddy(cand, c1, c2, c3)) continue;

                    // Deduplicate (different combinations can yield the same circle)
                    const key = `${Math.round(k4 * 1e4)},${Math.round(z4.re * 1e4)},${Math.round(z4.im * 1e4)}`;
                    if (!seen.has(key)) { seen.add(key); valid.push(cand); }
                }
            }
            return valid;
        }

        // ── Gasket generation via BFS ───────────────────────────────────────────────
        // Starting configuration: 1 outer + 4 inner circles (all mutually tangent in groups of 3).
        //
        // Curvature verification via Descartes (k1+k2+k3+k4)² = 2(k1²+k2²+k3²+k4²):
        //   (cO,cL,cR,cT): (-1+2+2+3)² = 36 = 2(1+4+4+9) = 36 ✓
        //   (cO,cL,cR,cB): same by symmetry ✓
        //   (cO,cL,cT): k4 from (-1+2+3)² formula → next level circles
        //
        // Tangency distances (verified):
        //   cO↔cL: |−0.5−0| = 0.5 = |1−0.5| (internal) ✓
        //   cL↔cR: |−0.5−0.5| = 1 = 0.5+0.5 (external) ✓
        //   cL↔cT: dist = 5/6 = 0.5+1/3 ✓
        //   cO↔cT: 2/3 = 1−1/3 (internal) ✓
        const cO = { k: -1, x: 0, y: 0 };
        const cL = { k: 2, x: -0.5, y: 0 };
        const cR = { k: 2, x: 0.5, y: 0 };
        const cT = { k: 3, x: 0, y: 2 / 3 };
        const cB = { k: 3, x: 0, y: -2 / 3 };

        const MIN_R = 0.003;   // minimum radius to generate (in unit-circle world space)
        const MAX_ITER = 80000;

        function circleKey(c) {
            return `${Math.round(c.k * 1e5)},${Math.round(c.x * 1e5)},${Math.round(c.y * 1e5)}`;
        }

        function buildGasket() {
            const circles = new Map();
            [cO, cL, cR, cT, cB].forEach(c => circles.set(circleKey(c), c));

            // All mutually-tangent triples from the 5 base circles
            const queue = [
                [cO, cL, cT], [cO, cL, cB],
                [cO, cR, cT], [cO, cR, cB],
                [cL, cR, cT], [cL, cR, cB],
            ];
            const seenTriples = new Set(queue.map(t => t.map(circleKey).sort().join('|')));

            let iter = 0;
            while (queue.length && iter++ < MAX_ITER) {
                const [c1, c2, c3] = queue.shift();
                for (const nc of soddyPair(c1, c2, c3)) {
                    if (1 / nc.k < MIN_R) continue;
                    const key = circleKey(nc);
                    if (circles.has(key)) continue;
                    circles.set(key, nc);

                    // Spawn 3 new triples pairing the new circle with each edge of the current triple
                    for (const [a, b] of [[c1, c2], [c1, c3], [c2, c3]]) {
                        const tk = [circleKey(a), circleKey(b), key].sort().join('|');
                        if (!seenTriples.has(tk)) { seenTriples.add(tk); queue.push([a, b, nc]); }
                    }
                }
            }
            return [...circles.values()];
        }

        // ── Render ──────────────────────────────────────────────────────────────────
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');

        function render() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const W = canvas.width, H = canvas.height;

            const t0 = performance.now();
            const circles = buildGasket();
            const elapsed = (performance.now() - t0).toFixed(0);

            const scale = Math.min(W, H) * 1.28;
            const ox = W / 2, oy = H / 2;

            ctx.clearRect(0, 0, W, H);

            // ── Outer bounding circle ──
            ctx.beginPath();
            ctx.arc(ox, oy, scale, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(96,165,250,0.3)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // ── Inner circles: sorted large → small ──
            const inner = circles.filter(c => c.k > 0).sort((a, b) => a.k - b.k);
            const maxK = inner.at(-1)?.k ?? 1;

            for (const c of inner) {
                const r = (1 / c.k) * scale;
                const sx = ox + c.x * scale;
                const sy = oy + c.y * scale;
                if (r < 0.4) continue;

                const t = Math.log(c.k) / Math.log(maxK);   // 0 = largest, 1 = smallest
                const hue = 200 + t * 150;                     // blue → magenta
                const lit = Math.round(70 - t * 30);           // 70% → 40% lightness
                const alf = Math.max(0.04, 0.9 - t * 0.85);

                ctx.beginPath();
                ctx.arc(sx, sy, r, 0, Math.PI * 2);
                if (r > 15) {
                    ctx.fillStyle = `hsla(${hue},60%,${lit}%,0.05)`;
                    ctx.fill();
                }
                ctx.strokeStyle = `hsla(${hue},85%,${lit}%,${alf.toFixed(2)})`;
                ctx.lineWidth = Math.max(0.3, 2 - t * 1.7);
                ctx.stroke();
            }

            document.getElementById('info').textContent =
                `${inner.length} circles  ·  ${elapsed} ms  ·  min r ≈ ${MIN_R}`;
        }

        render();
        window.addEventListener('resize', render);
    </script>
</body>

</html>
